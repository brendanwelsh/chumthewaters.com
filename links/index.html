<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="canonical" href="https://chumthewaters.com/links">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='31' fill='%23111'/%3E%3Ccircle cx='32' cy='32' r='28' fill='none' stroke='white' stroke-width='2.5'/%3E%3Cpath d='M32 12 Q28 18 24 26 L18 36 Q16 40 20 42 Q24 43 28 40 L30 36 Q31 46 32 50 Q33 46 34 36 L36 40 Q40 43 44 42 Q48 40 46 36 L40 26 Q36 18 32 12Z' fill='white'/%3E%3Cpath d='M25 34 Q28 31 32 33 Q36 31 39 34' fill='none' stroke='%23111' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M27 33 L28 35 M30 32 L30.5 34.5 M33.5 34.5 L34 32 M36 35 L37 33' stroke='%23111' stroke-width='0.8'/%3E%3Ccircle cx='27' cy='28' r='1.5' fill='%23111'/%3E%3Ccircle cx='37' cy='28' r='1.5' fill='%23111'/%3E%3C/svg%3E">
<meta name="description" content="Chum the Waters — Something's in the water.">
<meta property="og:title" content="Chum the Waters">
<title>Chum the Waters</title>
<style>
  @font-face {
    font-family: 'Jaws';
    src: url('/amity-jack.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #1a90c0; -webkit-user-select: none; user-select: none; }

  .scene {
    position: fixed; inset: 0; overflow: hidden;
    background: linear-gradient(180deg,
      #f4f8fb 0%,
      #eaf2f8 12%,
      #d0e4f0 22%,
      #a0d0e8 32%,
      #60b8d8 40%,
      #30a0c8 46%,
      #1890bc 50%,
      #1080b0 54%,
      #0870a0 60%,
      #065e8e 68%,
      #044e7c 78%,
      #034068 88%,
      #023058 100%
    );
    animation: sceneIn 1s ease;
  }
  @keyframes sceneIn { 0% { opacity: 0; } 100% { opacity: 1; } }

  /* Water texture via subtle radial highlights */
  .scene::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 25% 30%, rgba(255,255,255,0.06), transparent 35%),
      radial-gradient(ellipse at 70% 25%, rgba(255,255,255,0.05), transparent 30%),
      radial-gradient(ellipse at 50% 55%, rgba(0,50,90,0.06), transparent 25%),
      radial-gradient(ellipse at 15% 65%, rgba(0,60,100,0.05), transparent 30%),
      radial-gradient(ellipse at 85% 60%, rgba(0,50,90,0.04), transparent 25%);
  }

  /* Film grain */
  .grain {
    position: fixed; inset: 0; z-index: 200; pointer-events: none;
    opacity: 0.022; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  /* ── Title — above water, top of page ── */
  .title {
    position: absolute;
    top: clamp(10px, 4vh, 50px); left: 0; right: 0;
    text-align: center; z-index: 20;
    padding: 0 16px;
    animation: titleIn 1.5s ease 0.2s both;
  }

  /* ── Below-water layout — boat at horizon, everything flows down ── */
  .below-water {
    position: absolute;
    top: 42%; left: 0; right: 0; bottom: 0;
    z-index: 15;
    display: flex; flex-direction: column;
    align-items: center;
    padding-top: 0;
    overflow-y: auto; overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .below-water::-webkit-scrollbar { display: none; }
  @keyframes titleIn { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; } }

  .title-chum {
    font-family: 'Jaws', 'Bebas Neue', Impact, sans-serif;
    font-size: clamp(80px, 22vw, 240px);
    font-weight: normal;
    letter-spacing: clamp(-4px, -0.3vw, -1px);
    line-height: 0.85;
    text-transform: uppercase;
    color: #c42020;
    text-shadow: 0 3px 8px rgba(0,0,0,0.1), 0 0 60px rgba(180,30,30,0.06);
    display: block;
  }

  .title-waters {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: clamp(13px, 2.8vw, 28px);
    font-weight: 400;
    letter-spacing: clamp(8px, 3vw, 30px);
    text-indent: clamp(8px, 3vw, 30px); /* compensate for letter-spacing centering */
    text-transform: uppercase;
    color: rgba(140,25,25,0.55);
    display: block;
    margin-top: clamp(-6px, -0.5vw, -2px);
    -webkit-user-select: none; user-select: none;
  }

  /* ── Tagline ── */
  .tagline {
    text-align: center;
    margin-top: clamp(10px, 2vh, 24px);
    flex-shrink: 0;
    min-height: 20px; /* prevent reflow when text changes */
    width: 100%;
  }
  .tagline p {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: clamp(8px, 1.1vw, 12px);
    letter-spacing: clamp(4px, 1vw, 10px);
    text-transform: uppercase;
    color: rgba(240,245,250,0.35);
    font-weight: 500;
    animation: tPulse 5s ease-in-out infinite;
    -webkit-user-select: none; user-select: none;
  }
  @keyframes tPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }

  /* ── Boat — real image ── */
  .boat {
    cursor: pointer;
    animation: boatBob 8s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes boatBob {
    0%,100% { transform: rotate(-0.15deg) translateY(0); }
    50% { transform: rotate(0.15deg) translateY(-2px); }
  }
  .boat img {
    width: clamp(55px, 10vw, 100px);
    height: auto;
    filter: brightness(0.2) contrast(1.2);
    opacity: 0.45;
    transition: transform 2.5s ease, opacity 2.5s ease, filter 2.5s ease;
  }
  /* Boat returns from left */
  .boat.returning img {
    animation: boatReturn 4s ease-out forwards !important;
  }
  @keyframes boatReturn {
    0% { transform: translateX(-60vw) translateY(0) scale(0.5); opacity: 0; filter: brightness(0.1); }
    30% { opacity: 0.3; filter: brightness(0.15); }
    100% { transform: translateX(0) translateY(0) scale(1); opacity: 0.45; filter: brightness(0.2) contrast(1.2); }
  }

  /* Sinking — boat shrinks and falls to the very bottom */
  .boat.sink-1 img { transform: translateY(5vh) rotate(4deg) scale(0.9); opacity: 0.2; }
  .boat.sink-2 img { transform: translateY(15vh) rotate(10deg) scale(0.7); opacity: 0.1; filter: brightness(0.1); }
  .boat.sink-3 img { transform: translateY(30vh) rotate(18deg) scale(0.5); opacity: 0.04; filter: brightness(0.05); }
  .boat.sink-4 img { transform: translateY(45vh) rotate(28deg) scale(0.3); opacity: 0; filter: brightness(0); }
  .boat.sink-5 img { transform: translateY(60vh) rotate(40deg) scale(0.1); opacity: 0; filter: brightness(0); }

  /* ── Barrels — real images ── */
  .barrels {
    display: flex;
    gap: clamp(18px, 4vw, 48px);
    align-items: flex-start;
    margin-top: clamp(16px, 4vh, 40px);
    animation: bIn 1.5s ease 0.5s both;
    flex-shrink: 0;
  }
  @keyframes bIn { 0% { opacity: 0; } 100% { opacity: 1; } }

  .barrel-link {
    display: flex; flex-direction: column; align-items: center;
    text-decoration: none; cursor: pointer;
    position: relative;
  }
  .barrel-link:nth-child(1) { animation: b1 5.0s ease-in-out infinite; }
  .barrel-link:nth-child(2) { animation: b2 4.6s ease-in-out infinite; }
  .barrel-link:nth-child(3) { animation: b3 5.3s ease-in-out infinite; }
  .barrel-link:nth-child(4) { animation: b4 4.8s ease-in-out infinite; }
  /* Each barrel at a different resting height — scattered, not a line */
  .barrel-link:nth-child(1) { margin-top: 8px; }
  .barrel-link:nth-child(2) { margin-top: 0; }
  .barrel-link:nth-child(3) { margin-top: 14px; }
  .barrel-link:nth-child(4) { margin-top: 4px; }
  @keyframes b1 { 0%,100% { transform: translateY(0) rotate(-1.5deg); } 50% { transform: translateY(-8px) rotate(1.5deg); } }
  @keyframes b2 { 0%,100% { transform: translateY(0) rotate(1deg); } 50% { transform: translateY(-10px) rotate(-0.8deg); } }
  @keyframes b3 { 0%,100% { transform: translateY(0) rotate(0.8deg); } 50% { transform: translateY(-7px) rotate(-1deg); } }
  @keyframes b4 { 0%,100% { transform: translateY(0) rotate(-0.8deg); } 50% { transform: translateY(-9px) rotate(0.8deg); } }

  .barrel-img-wrap {
    width: clamp(42px, 9vw, 68px);
    position: relative;
    filter: drop-shadow(0 4px 14px rgba(0,30,50,0.35));
    transition: transform 0.35s, filter 0.35s;
  }
  .barrel-link:hover .barrel-img-wrap {
    transform: scale(1.08) translateY(-4px);
    filter: drop-shadow(0 8px 22px rgba(0,30,50,0.4)) drop-shadow(0 0 14px rgba(200,180,40,0.12));
  }
  .barrel-img-wrap img {
    width: 100%; height: auto;
    display: block;
  }

  /* Social icon overlay on barrel */
  .barrel-icon {
    position: absolute;
    top: 56%; left: 50%; transform: translate(-50%, -50%);
    width: clamp(18px, 4vw, 28px);
    height: clamp(18px, 4vw, 28px);
    opacity: 0.6;
    transition: opacity 0.3s;
    mix-blend-mode: multiply;
  }
  .barrel-link:hover .barrel-icon { opacity: 0.8; }
  .barrel-icon svg { width: 100%; height: 100%; fill: #3a2a08; }

  /* Reflection */
  .barrel-reflect {
    width: 80%; height: 6px; margin-top: 2px; align-self: center;
    background: radial-gradient(ellipse, rgba(180,160,40,0.06), transparent);
    border-radius: 50%;
  }

  .barrel-label { display: none; }

  /* ── Shark — real image at bottom ── */
  /* Open-mouth shark — in flow, pushed to bottom */
  .shark {
    pointer-events: none;
    flex-shrink: 0;
    margin-top: auto; /* pushes to bottom of flex container */
    animation: sharkDrift 16s ease-in-out infinite alternate;
  }
  @keyframes sharkDrift {
    0% { transform: translateY(0); }
    100% { transform: translateY(-6px); }
  }
  .shark img {
    width: clamp(180px, 40vw, 420px);
    height: auto;
    opacity: 0.16;
    filter: brightness(0.5) contrast(1.3) hue-rotate(-10deg);
    mask-image: linear-gradient(to bottom, black 40%, transparent 95%);
    -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 95%);
  }

  /* ── Shark fin — JS controlled ── */
  .fin {
    position: fixed; z-index: 12; pointer-events: none;
    transition: none;
  }
  .fin svg {
    width: 34px; height: 50px;
    fill: #0c4a68;
    filter: drop-shadow(0 2px 4px rgba(0,20,40,0.4));
  }
  /* V-wake trail behind fin */
  .fin-wake {
    position: absolute; bottom: 8px; right: 100%; margin-right: -4px;
    width: 70px; height: 8px;
    pointer-events: none;
  }
  .fin-wake::before, .fin-wake::after {
    content: '';
    position: absolute; right: 0;
    width: 60px; height: 1.5px;
    background: linear-gradient(270deg, rgba(255,255,255,0.07), transparent);
    border-radius: 1px;
  }
  .fin-wake::before { top: 1px; transform: rotate(-4deg); }
  .fin-wake::after { bottom: 1px; transform: rotate(4deg); }
  /* Barrel(s) towed behind fin */
  .fin-tow {
    position: absolute; top: -10px; right: 100%; margin-right: 30px;
    display: flex; gap: 8px; align-items: center;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .fin-tow.show { opacity: 1; }
  .fin-tow-barrel {
    width: 18px; height: auto;
    animation: towBob 1.8s ease-in-out infinite;
    filter: drop-shadow(0 2px 4px rgba(0,20,40,0.3));
  }
  .fin-tow-barrel:nth-child(2) { animation-delay: -0.6s; width: 16px; }
  .fin-tow-barrel:nth-child(3) { animation-delay: -1.2s; width: 15px; }
  @keyframes towBob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-3px) rotate(4deg); } }
  /* Rope from fin to barrels */
  .fin-rope {
    position: absolute; top: 50%; right: 100%; margin-right: 0;
    width: 35px; height: 1px;
    background: linear-gradient(270deg, rgba(100,80,40,0.2), rgba(100,80,40,0.05));
  }

  /* ── Quote ── */
  .quote {
    position: fixed; bottom: 3%; left: 0; right: 0;
    text-align: center; z-index: 20; pointer-events: none;
  }
  .quote p {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: clamp(7px, 0.9vw, 10px);
    letter-spacing: 2px;
    color: rgba(0,40,70,0.1);
    font-style: italic; font-weight: 300;
  }

  /* ── Sound ── */
  .sound-btn {
    position: fixed; bottom: 12px; right: 12px; z-index: 100;
    width: 34px; height: 34px; border-radius: 8px;
    background: rgba(0,40,60,0.05);
    border: 1px solid rgba(0,40,60,0.06);
    color: rgba(0,50,80,0.18);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s;
  }
  .sound-btn:hover { color: rgba(0,50,80,0.35); background: rgba(0,40,60,0.08); }
  .sound-btn.on { color: #a02020; border-color: rgba(160,30,30,0.15); }
  .sound-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .barrels { gap: 12px; }
    .boat img { width: clamp(35px, 10vw, 50px); }
    .shark img { width: clamp(180px, 60vw, 280px); }
  }
  /* ── Easter egg: blood drips ── */
  .title-chum {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    position: relative;
  }


  /* ── Side shark — JS controlled, only one shark visible at a time ── */
  .shark-side-row {
    width: 100%;
    height: clamp(80px, 15vh, 160px);
    position: relative;
    overflow: hidden;
    pointer-events: none;
    flex-shrink: 0;
    margin-top: clamp(12px, 2vh, 24px);
  }
  .shark-side {
    position: absolute;
    top: 0; left: -15%;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .shark-side img {
    height: clamp(70px, 12vh, 140px);
    width: auto;
    filter: brightness(0.4) contrast(1.1) hue-rotate(-8deg);
    opacity: 0.12;
  }

  /* Everything else fades during attack */
  .scene.attack-mode .barrels,
  .scene.attack-mode .tagline,
  .scene.attack-mode .fin,
  .scene.attack-mode .quote {
    transition: opacity 0.5s;
    opacity: 0.15;
  }
  .scene.attack-mode .shark {
    transition: opacity 0.8s;
    opacity: 0 !important;
  }

  /* Boat sinks straight down into shark mouth */
  .boat.sinking {
    animation: boatSink 3s ease-in forwards !important;
    z-index: 24;
  }
  @keyframes boatSink {
    0% { transform: translateY(0); opacity: 0.45; }
    100% { transform: translateY(60vh); opacity: 0; }
  }

  /* "Bigger boat" flash quote */
  .bigger-boat {
    position: fixed;
    top: 32%; left: 50%; transform: translate(-50%, 0);
    z-index: 60; pointer-events: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: clamp(16px, 3vw, 32px);
    color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    letter-spacing: clamp(2px, 0.5vw, 6px);
    text-transform: uppercase;
    font-weight: 300;
    opacity: 0;
    white-space: nowrap;
  }
  .bigger-boat.show {
    animation: biggerBoat 3s ease-in-out forwards;
  }
  @keyframes biggerBoat {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
    15% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    70% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, 0) scale(1.02); }
  }

  /* Splash overlay */
  .splash {
    position: fixed; inset: 0; z-index: 55;
    pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.3), transparent 60%);
  }
  .splash.active {
    animation: splashFlash 0.5s ease-out forwards;
  }
  @keyframes splashFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* Screen shake */
  .scene.shake {
    animation: screenShake 0.6s ease-out;
  }
  @keyframes screenShake {
    0% { transform: translate(0,0); }
    12% { transform: translate(-8px, 5px); }
    25% { transform: translate(7px, -4px); }
    37% { transform: translate(-5px, 3px); }
    50% { transform: translate(4px, -3px); }
    62% { transform: translate(-3px, 2px); }
    75% { transform: translate(2px, -1px); }
    100% { transform: translate(0,0); }
  }

  .title-chum.bloody {
    text-shadow: 0 3px 8px rgba(0,0,0,0.1), 0 0 80px rgba(180,30,30,0.15), 0 0 120px rgba(160,20,20,0.1);
  }

  /* Chum cloud under boat — spreads like blood in water */
  .chum-cloud {
    position: fixed;
    z-index: 6; pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(ellipse,
      rgba(140,20,15,0.4) 0%,
      rgba(120,15,10,0.25) 20%,
      rgba(100,10,8,0.15) 40%,
      rgba(80,8,5,0.06) 65%,
      transparent 85%
    );
    width: 0; height: 0;
    transition: width 1.2s cubic-bezier(0.2,0.8,0.3,1), height 1.2s cubic-bezier(0.2,0.8,0.3,1), opacity 2s ease;
    opacity: 0;
    transform: translateX(-50%);
    mix-blend-mode: multiply;
  }
  .chum-cloud.active { opacity: 1; }

  /* Boat shake on click */
  .boat.bumped {
    animation: boatBump 0.6s ease-out;
  }
  @keyframes boatBump {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(-2deg) translateY(-1px); }
    40% { transform: rotate(1.5deg) translateY(1px); }
    60% { transform: rotate(-1deg); }
    100% { transform: rotate(0deg); }
  }

  /* Ripple rings from boat click */
  .chum-ripple {
    position: fixed; pointer-events: none; z-index: 7;
    border: 1px solid rgba(140,30,20,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: rippleOut 2s ease-out forwards;
  }
  @keyframes rippleOut {
    0% { width: 10px; height: 6px; opacity: 0.4; }
    100% { width: 200px; height: 60px; opacity: 0; }
  }
</style>
</head>
<body>
<div class="scene">

  <!-- Title — above water -->
  <div class="title">
    <span class="title-chum" id="chum">Chum</span>
    <span class="title-waters">The Waters</span>
  </div>

  <!-- Below water — boat at horizon, everything flows down -->
  <div class="below-water">

  <!-- Boat at horizon -->
  <div class="boat" id="boat">
    <img src="/boat.png" alt="" loading="eager">
  </div>

  <!-- Barrels -->
  <div class="barrels">
    <a href="https://x.com/chumthewaters" target="_blank" rel="noopener" class="barrel-link" aria-label="X / Twitter">
      <div class="barrel-img-wrap">
        <img src="/barrel.png" alt="">
        <div class="barrel-icon"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
      </div>
      <div class="barrel-reflect"></div>
      <span class="barrel-label">Twitter</span>
    </a>

    <a href="https://twitch.tv/chumthewaters" target="_blank" rel="noopener" class="barrel-link" aria-label="Twitch">
      <div class="barrel-img-wrap">
        <img src="/barrel.png" alt="">
        <div class="barrel-icon"><svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg></div>
      </div>
      <div class="barrel-reflect"></div>
      <span class="barrel-label">Twitch</span>
    </a>

    <a href="https://youtube.com/@chumthewaterslol" target="_blank" rel="noopener" class="barrel-link" aria-label="YouTube">
      <div class="barrel-img-wrap">
        <img src="/barrel.png" alt="">
        <div class="barrel-icon"><svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12z"/></svg></div>
      </div>
      <div class="barrel-reflect"></div>
      <span class="barrel-label">YouTube</span>
    </a>

<div class="sound-btn" id="s">
  <svg id="sOff" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  <svg id="sOn" style="display:none" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
</div>

<script>
// ── Audio ──
var ac=null,soundOn=false,jawsP=false,jawsIv=null;
function pn(f,t,d){if(!ac||!soundOn)return;var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.1,t+.05);g.gain.linearRampToValueAtTime(.07,t+d*.7);g.gain.linearRampToValueAtTime(0,t+d);o.start(t);o.stop(t+d);var o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.type='sine';o2.frequency.value=f/2;g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.03,t+.05);g2.gain.linearRampToValueAtTime(0,t+d);o2.start(t);o2.stop(t+d);}
function jawsSeq(){if(!soundOn||!ac){jawsP=false;return;}var t=ac.currentTime,s=t;for(var i=0;i<6;i++){var g=.5-i*.04;pn(82.41,s,g*.8);s+=g;pn(87.31,s,g*.8);s+=g;}for(var i=0;i<4;i++){var g=.22-i*.03;pn(82.41,s,g*.8);s+=g;pn(87.31,s,g*.8);s+=g;}}
document.getElementById('s').onclick=function(){
  if(!ac)ac=new(AudioContext||webkitAudioContext)();
  if(ac.state==='suspended')ac.resume();
  soundOn=!soundOn;
  document.getElementById('sOff').style.display=soundOn?'none':'block';
  document.getElementById('sOn').style.display=soundOn?'block':'none';
  document.getElementById('s').classList.toggle('on',soundOn);
  if(soundOn){if(!jawsP){jawsP=true;jawsSeq();jawsIv=setInterval(function(){if(soundOn)jawsSeq();else{jawsP=false;clearInterval(jawsIv);}},6500);}}
  else{jawsP=false;if(jawsIv)clearInterval(jawsIv);if(ac){ac.close();ac=null;}}
};

// ── Shark fin — JS animated ──
var finEl = document.getElementById('fin');
var finTow = document.getElementById('finTow');
var finRopeEl = document.getElementById('finRope');
// ── Fin — no barrel towing ──
var finX = -60, finDir = 1, finTime = 0;
function updateFin(dt) {
  finTime += dt;
  var w = window.innerWidth, h = window.innerHeight;
  finX += 0.7 * finDir * dt * 0.06;
  var baseY = h * 0.46;
  var bobY = Math.sin(finTime * 0.002) * 4 + Math.sin(finTime * 0.0015) * 2;
  if (finX > w + 60) { finDir = -1; }
  if (finX < -60) { finDir = 1; }
  finEl.style.left = finX + 'px';
  finEl.style.top = (baseY + bobY) + 'px';
  finEl.style.opacity = '0.5';
  finEl.style.transform = 'scaleX(' + (finDir === 1 ? 1 : -1) + ')';
}

// ── Side shark — JS controlled, never overlaps bottom shark ──
var sharkSide = document.getElementById('sharkSide');
var bottomShark = document.querySelector('.shark');
var sideSharkX = -20, sideSharkDir = 1, sideSharkActive = false;
var sideSharkCooldown = 0;

function updateSideShark(dt) {
  sideSharkCooldown -= dt;
  if (!sideSharkActive) {
    // Start a pass randomly, but only if cooldown is done
    if (sideSharkCooldown <= 0 && Math.random() < 0.0003) {
      sideSharkActive = true;
      sideSharkX = -20;
      sideSharkDir = Math.random() > 0.5 ? 1 : -1;
      if (sideSharkDir === -1) sideSharkX = 120;
      sharkSide.style.opacity = '1';
      // Hide fin while side shark is visible (not the bottom shark)
      finEl.style.opacity = '0';
    }
    return;
  }
  sideSharkX += sideSharkDir * dt * 0.03;
  sharkSide.style.left = sideSharkX + '%';
  sharkSide.style.transform = 'scaleX(' + (sideSharkDir === 1 ? 1 : -1) + ')';
  // End pass
  if ((sideSharkDir === 1 && sideSharkX > 115) || (sideSharkDir === -1 && sideSharkX < -20)) {
    sideSharkActive = false;
    sharkSide.style.opacity = '0';
    sideSharkCooldown = 15000; // 15s before next pass
    // Show fin again
    finEl.style.opacity = '0.5';
  }
}

// ── Boat click — subtle shake, 10 clicks = sink ──
var boatEl = document.getElementById('boat');
var clicks = 0, clickTimer = null, boatSunk = false;

function shakeBoat() {
  boatEl.classList.remove('bumped');
  void boatEl.offsetWidth;
  boatEl.classList.add('bumped');
  setTimeout(function() { boatEl.classList.remove('bumped'); }, 500);
}

function sinkBoat() {
  boatSunk = true;
  boatEl.classList.add('sinking');
  // Show "bigger boat" message partway through sink
  setTimeout(function() {
    var msg = document.querySelector('.bigger-boat');
    msg.classList.add('show');
  }, 1200);
  // Reset boat after it's gone
  setTimeout(function() {
    boatEl.classList.remove('sinking');
    boatEl.style.display = 'none';
    void boatEl.offsetWidth;
    setTimeout(function() {
      boatEl.style.display = '';
      boatSunk = false;
      clicks = 0;
    }, 2000);
  }, 3500);
}

function handleClick() {
  if (boatSunk) return;
  clicks++;
  shakeBoat();

  // Progressive sinking with each click
  for (var i = 1; i <= 5; i++) boatEl.classList.remove('sink-' + i);
  var sinkLevel = Math.min(clicks, 5);
  boatEl.classList.add('sink-' + sinkLevel);

  // Always: after a pause, disappear fully then return from left
  clearTimeout(clickTimer);
  clickTimer = setTimeout(function() {
    // Make sure it's fully gone
    boatEl.classList.remove('sink-' + sinkLevel);
    boatEl.classList.add('sink-5');
    boatSunk = true;
    // Return from left after disappearing
    setTimeout(function() {
      for (var i = 1; i <= 5; i++) boatEl.classList.remove('sink-' + i);
      boatEl.classList.add('returning');
      taglineText.textContent = "You're gonna need a bigger boat";
      setTimeout(function() {
        boatEl.classList.remove('returning');
        clicks = 0;
        boatSunk = false;
        taglineText.textContent = "Something's in the water";
      }, 4000);
    }, 3000);
  }, 4000);
}
boatEl.addEventListener('click', handleClick);

// ── Loop ──
var lastT = performance.now();
(function loop(now) {
  var dt = Math.min(now - lastT, 50); lastT = now;
  updateFin(dt);
  updateSideShark(dt);
  requestAnimationFrame(loop);
})(performance.now());
</script>
